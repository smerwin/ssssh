name: ssssh
options:
  bundleIdPrefix: com.smerwin
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  usesTabs: false
  indentWidth: 4
  tabWidth: 4

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_PREVIEWS: YES
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.2.4
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: 0.7.0

targets:
  ssssh:
    type: application
    platform: iOS
    sources:
      - path: ssssh/Sources
    resources:
      - path: ssssh/Resources
    info:
      path: ssssh/Sources/App/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSFaceIDUsageDescription: "ssssh uses Face ID to protect access to your private SSH keys."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smerwin.ssssh
        PRODUCT_NAME: ssssh
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    dependencies:
      - package: SwiftTerm
      - package: Citadel
    scheme:
      testTargets:
        - sssshTests
      gatherCoverageData: true

  sssshTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ssssh/Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.smerwin.ssssh.sssshTests
    dependencies:
      - target: ssssh

schemes:
  ssssh:
    build:
      targets:
        ssssh: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - sssshTests
    archive:
      config: Release
